# Postgres local para desenvolvimento. Credenciais aqui são dummy de dev —
# nunca use estes valores fora da sua máquina.
services:
  postgres:
    image: postgres:17-alpine
    container_name: morpheus-postgres
    environment:
      POSTGRES_DB: morpheus
      POSTGRES_USER: morpheus
      POSTGRES_PASSWORD: morpheus
    ports:
      - "5432:5432"
    volumes:
      - morpheus-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morpheus -d morpheus"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Seq: coletor e visualizador de logs/traces em desenvolvimento. Recebe os logs
  # do sink Serilog (5341) e os traces via OTLP (/ingest/otlp). Só para a máquina
  # local — em produção os logs vão por stdout e os traces por OTLP ao APM real.
  seq:
    image: datalust/seq:latest
    container_name: morpheus-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - morpheus-seq:/data

volumes:
  morpheus-postgres:
  morpheus-seq:
